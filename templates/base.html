<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ page_title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ curriculum.description }}{% endblock %}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Highlight.js (syntax highlighting) -->
  <link rel="stylesheet" href="/static/highlight.min.css">
  <script src="/static/highlight.min.js" defer></script>

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ─── Top navigation bar ─── -->
<header class="site-header">
  <nav class="nav-container">
    <a href="/" class="nav-brand" aria-label="{{ curriculum.title }} home">
      <svg class="nav-brand-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="20" cy="20" r="20" fill="url(#brand-gradient)"/>
        <path d="M12 28L20 12L28 28" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14.5 23H25.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <defs>
          <linearGradient id="brand-gradient" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop stop-color="#6366f1"/>
            <stop offset="1" stop-color="#a855f7"/>
          </linearGradient>
        </defs>
      </svg>
      <span>{{ curriculum.title }}</span>
    </a>

    <div class="nav-actions">
      <button id="search-toggle" class="btn-icon" aria-label="Search" aria-expanded="false" aria-controls="search-overlay">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
      <button id="theme-toggle" class="btn-icon" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </nav>
</header>

<!-- ─── Search overlay ─── -->
<div id="search-overlay" class="search-overlay" role="dialog" aria-modal="true" aria-label="Search" hidden>
  <div class="search-box">
    <label for="search-input" class="sr-only">Search lessons</label>
    <input id="search-input" type="search" placeholder="Search lessons…" autocomplete="off" spellcheck="false">
    <div id="search-results" class="search-results" role="listbox" aria-label="Search results"></div>
  </div>
  <button id="search-close" class="search-close" aria-label="Close search">✕</button>
</div>

<!-- ─── Page content ─── -->
<main id="main-content">
  {% block content %}{% endblock %}
</main>

<!-- ─── Footer ─── -->
<footer class="site-footer">
  <div class="footer-container">
    <p>
      Built with <strong>odin-ssg</strong> •
      Content licensed under
      <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" rel="noopener noreferrer">CC BY-NC-SA 4.0</a>
    </p>
  </div>
</footer>

<!-- ─── Scripts ─── -->
<script>
  // Syntax highlighting
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
  });
</script>
<script src="/static/theme.js" defer></script>
<script src="/static/search.js" defer></script>
</body>
</html>
